name: Build and Deploy Next.js to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            npm install --loglevel=error && echo "Success!" && break
            echo "Failed, retrying in 5s..."
            sleep 5
          done

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 4a231bf78ffa10bfebe25d64ca3fc44f
          projectName: imagegogo
          directory: out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
