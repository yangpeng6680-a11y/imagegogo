name: Build and Deploy Next.js

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        env:
          HOME: /github/home
          npm_config_cache: /github/home/.npm
        run: |
          mkdir -p "$HOME/.npm"
          npm install --loglevel=error 2>&1 || \
          npm install --loglevel=error 2>&1 || \
          npm install --loglevel=error 2>&1

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out
