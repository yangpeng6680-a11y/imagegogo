name: Build and Deploy Next.js to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g yarn
          yarn install

      - name: Build Next.js
        run: yarn build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy docs --project-name=imagegogo --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
