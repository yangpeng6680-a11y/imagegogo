name: Build and Deploy Next.js

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (retry on failure)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            npm install --no-audit --no-fund && echo "Success!" && break
            echo "Failed, retrying in 10s..."
            sleep 10
          done

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out
