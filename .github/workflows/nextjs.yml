name: Build and Deploy Next.js to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Downgrade npm to v9 (avoid v10 exit handler bug)
        run: npm install -g npm@9 && npm --version

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=imagegogo --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
